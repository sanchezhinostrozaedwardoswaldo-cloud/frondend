<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Tickets - Administración</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --color-alta: #dc2626;
            --color-media: #d97706;
            --color-baja: #059669;
            --color-abierto: #3b82f6;
            --color-proceso: #7c3aed;
            --color-resuelto: #10b981;
        }
        body {
            background: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .navbar {
            background: linear-gradient(90deg, #1e3a8a 0%, #3b82f6 100%);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .stats-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .stats-card:hover {
            transform: translateY(-2px);
        }
        .ticket-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            transition: all 0.3s;
            overflow: hidden;
        }
        .ticket-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }

        /* Colores dinámicos según prioridad/estado */
        .ticket-card.prioridad-alta {
            border-left: 5px solid var(--color-alta);
            background: linear-gradient(to right, #fef2f2, white);
        }
        .ticket-card.prioridad-media {
            border-left: 5px solid var(--color-media);
            background: linear-gradient(to right, #fffbeb, white);
        }
        .ticket-card.prioridad-baja {
            border-left: 5px solid var(--color-baja);
            background: linear-gradient(to right, #ecfdf5, white);
        }
        .ticket-card.estado-resuelto {
            border-left: 5px solid var(--color-resuelto) !important;
            background: linear-gradient(to right, #d1fae5, white) !important;
            opacity: 0.85;
        }

        .badge-prioridad {
            font-size: 0.75rem;
            padding: 0.4em 0.8em;
            border-radius: 50px;
            font-weight: 700;
        }
        .badge-alta { background: var(--color-alta); color: white; }
        .badge-media { background: var(--color-media); color: white; }
        .badge-baja { background: var(--color-baja); color: white; }

        .badge-estado {
            font-size: 0.8rem;
            padding: 0.5em 1em;
            border-radius: 50px;
            font-weight: 600;
        }
        .estado-abierto { background: #dbeafe; color: var(--color-abierto); }
        .estado-proceso { background: #ede9fe; color: var(--color-proceso); }
        .estado-resuelto { background: #d1fae5; color: var(--color-resuelto); }

        .btn-estado {
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 0.375rem 0.75rem;
            transition: all 0.2s;
        }
        .btn-estado:active {
            transform: scale(0.95);
        }

        .filtro-btn {
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .filtro-btn.active {
            background: #1e3a8a;
            color: white;
            border-color: #1e3a8a;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #6b7280;
        }
        .spinner-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            backdrop-filter: blur(4px);
        }
        .fecha-badge {
            font-size: 0.75rem;
            color: #6b7280;
        }
        .modulo-badge {
            background: #f3f4f6;
            color: #374151;
            font-size: 0.8rem;
            padding: 0.3em 0.8em;
            border-radius: 6px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="#">
                <svg width="28" height="28" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/>
                    <path d="M5.255 5.786a.237.237 0 0 0 .241.247h.825c.138 0 .248-.113.266-.25C6.54 4.173 7.312 3.5 8 3.5c1.178 0 2.14.902 2.14 2.013 0 .706-.353 1.29-.875 1.654a2.5 2.5 0 0 0-1.208 1.837l-.007.117c0 .11.09.2.202.2h1.006a.2.2 0 0 0 .2-.2 1.6 1.6 0 0 1 .762-1.345c.607-.41.931-1.064.931-1.863 0-1.754-1.518-3.174-3.368-3.174-1.886 0-3.398 1.453-3.398 3.248 0 .66.22 1.267.6 1.742.1.127.157.282.157.447 0 .17-.07.322-.183.434a.62.62 0 0 1-.434.183h-.825a.237.237 0 0 1-.241-.247zM8 12.5a1 1 0 1 0 0-2 1 1 0 0 0 0 2z"/>
                </svg>
                Panel de Tickets
            </a>
            <button class="btn btn-outline-light btn-sm rounded-pill" onclick="cargarTickets()">
                🔄 Actualizar
            </button>
        </div>
    </nav>

    <div class="container py-4">

        <!-- Estadísticas -->
        <div class="row g-3 mb-4" id="statsRow">
            <div class="col-6 col-md-3">
                <div class="card stats-card bg-white p-3">
                    <div class="d-flex align-items-center justify-content-between">
                        <div>
                            <h6 class="text-muted mb-1">Total</h6>
                            <h3 class="mb-0 fw-bold" id="statTotal">0</h3>
                        </div>
                        <span class="fs-1">📋</span>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card stats-card bg-white p-3">
                    <div class="d-flex align-items-center justify-content-between">
                        <div>
                            <h6 class="text-muted mb-1">Abiertos</h6>
                            <h3 class="mb-0 fw-bold text-primary" id="statAbiertos">0</h3>
                        </div>
                        <span class="fs-1">🔵</span>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card stats-card bg-white p-3">
                    <div class="d-flex align-items-center justify-content-between">
                        <div>
                            <h6 class="text-muted mb-1">En Proceso</h6>
                            <h3 class="mb-0 fw-bold text-warning" id="statProceso">0</h3>
                        </div>
                        <span class="fs-1">🟣</span>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card stats-card bg-white p-3">
                    <div class="d-flex align-items-center justify-content-between">
                        <div>
                            <h6 class="text-muted mb-1">Resueltos</h6>
                            <h3 class="mb-0 fw-bold text-success" id="statResueltos">0</h3>
                        </div>
                        <span class="fs-1">✅</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filtros -->
        <div class="d-flex flex-wrap gap-2 mb-4">
            <button class="btn btn-outline-primary filtro-btn active" onclick="filtrar('todos')">Todos</button>
            <button class="btn btn-outline-primary filtro-btn" onclick="filtrar('Abierto')">🔵 Abiertos</button>
            <button class="btn btn-outline-primary filtro-btn" onclick="filtrar('En Proceso')">🟣 En Proceso</button>
            <button class="btn btn-outline-primary filtro-btn" onclick="filtrar('Resuelto')">✅ Resueltos</button>
        </div>

        <!-- Grid de Tickets -->
        <div class="row g-3" id="ticketsContainer">
            <!-- Los tickets se inyectan aquí -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="empty-state d-none">
            <div class="fs-1 mb-3">📭</div>
            <h4>No hay tickets</h4>
            <p class="text-muted">No se encontraron tickets con los filtros seleccionados.</p>
        </div>
    </div>

    <!-- Spinner de carga -->
    <div id="spinner" class="spinner-overlay d-none">
        <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
            <span class="visually-hidden">Cargando...</span>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="toast" class="toast align-items-center text-white bg-dark border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body fw-bold" id="toastBody"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = 'https://backend-lnpk.onrender.com/api/tickets';
        let ticketsData = [];
        let filtroActual = 'todos';

        const toast = new bootstrap.Toast(document.getElementById('toast'));
        const toastBody = document.getElementById('toastBody');

        function showToast(msg, type = 'success') {
            toastBody.textContent = msg;
            document.getElementById('toast').className = `toast align-items-center text-white border-0 bg-${type === 'success' ? 'success' : 'danger'}`;
            toast.show();
        }

        function showSpinner(show) {
            document.getElementById('spinner').classList.toggle('d-none', !show);
        }

        function formatearFecha(fechaStr) {
            const fecha = new Date(fechaStr);
            return fecha.toLocaleString('es-MX', {
                day: '2-digit',
                month: 'short',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function getPrioridadClass(prioridad) {
            return {
                'Alta': 'prioridad-alta',
                'Media': 'prioridad-media',
                'Baja': 'prioridad-baja'
            }[prioridad] || 'prioridad-baja';
        }

        function getBadgePrioridad(prioridad) {
            return {
                'Alta': 'badge-alta',
                'Media': 'badge-media',
                'Baja': 'badge-baja'
            }[prioridad] || 'badge-baja';
        }

        function getBadgeEstado(estado) {
            return {
                'Abierto': 'estado-abierto',
                'En Proceso': 'estado-proceso',
                'Resuelto': 'estado-resuelto'
            }[estado] || 'estado-abierto';
        }

        function renderizarTickets(tickets) {
            const container = document.getElementById('ticketsContainer');
            const emptyState = document.getElementById('emptyState');

            if (tickets.length === 0) {
                container.innerHTML = '';
                emptyState.classList.remove('d-none');
                return;
            }

            emptyState.classList.add('d-none');

            container.innerHTML = tickets.map(ticket => {
                const isResuelto = ticket.estado === 'Resuelto';
                const prioridadClass = isResuelto ? 'estado-resuelto' : getPrioridadClass(ticket.prioridad);

                return `
                <div class="col-12 col-md-6 col-lg-4">
                    <div class="card ticket-card ${prioridadClass}" id="ticket-${ticket.id}">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <span class="badge badge-prioridad ${getBadgePrioridad(ticket.prioridad)}">
                                    ${ticket.prioridad === 'Alta' ? '🔴' : ticket.prioridad === 'Media' ? '🟡' : '🟢'} ${ticket.prioridad}
                                </span>
                                <span class="badge badge-estado ${getBadgeEstado(ticket.estado)}">
                                    ${ticket.estado}
                                </span>
                            </div>

                            <h5 class="card-title fw-bold mb-1">#${ticket.id} — ${ticket.cliente_nombre}</h5>
                            <div class="mb-2">
                                <span class="modulo-badge">📂 ${ticket.modulo_falla}</span>
                            </div>

                            <p class="card-text text-muted mb-3" style="font-size: 0.95rem; line-height: 1.5;">
                                ${ticket.descripcion}
                            </p>

                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <small class="fecha-badge">
                                    📅 ${formatearFecha(ticket.fecha_creacion)}
                                </small>
                                <small class="text-muted">
                                    📞 ${ticket.cliente_contacto}
                                </small>
                            </div>

                            <div class="d-flex gap-2">
                                ${ticket.estado !== 'Abierto' ? `
                                <button class="btn btn-outline-primary btn-estado flex-fill"
                                        onclick="cambiarEstado(${ticket.id}, 'Abierto')"
                                        ${isResuelto ? 'disabled' : ''}>
                                    🔵 Reabrir
                                </button>
                                ` : ''}

                                ${ticket.estado !== 'En Proceso' ? `
                                <button class="btn btn-outline-warning btn-estado flex-fill"
                                        onclick="cambiarEstado(${ticket.id}, 'En Proceso')"
                                        ${isResuelto ? 'disabled' : ''}>
                                    🟣 Procesar
                                </button>
                                ` : ''}

                                ${ticket.estado !== 'Resuelto' ? `
                                <button class="btn btn-success btn-estado flex-fill"
                                        onclick="cambiarEstado(${ticket.id}, 'Resuelto')">
                                    ✅ Resolver
                                </button>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        function actualizarStats(tickets) {
            document.getElementById('statTotal').textContent = tickets.length;
            document.getElementById('statAbiertos').textContent = tickets.filter(t => t.estado === 'Abierto').length;
            document.getElementById('statProceso').textContent = tickets.filter(t => t.estado === 'En Proceso').length;
            document.getElementById('statResueltos').textContent = tickets.filter(t => t.estado === 'Resuelto').length;
        }

        async function cargarTickets() {
            showSpinner(true);
            try {
                const url = filtroActual === 'todos'
                    ? API_URL
                    : `${API_URL}?estado=${encodeURIComponent(filtroActual)}`;

                const response = await fetch(url);
                if (!response.ok) throw new Error('Error al cargar tickets');

                ticketsData = await response.json();
                renderizarTickets(ticketsData);
                actualizarStats(ticketsData);

            } catch (error) {
                showToast('❌ ' + error.message, 'danger');
                console.error(error);
            } finally {
                showSpinner(false);
            }
        }

        async function cambiarEstado(id, nuevoEstado) {
            const btn = event.target;
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';

            try {
                const response = await fetch(`${API_URL}/${id}/estado`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ estado: nuevoEstado })
                });

                if (!response.ok) throw new Error('Error al actualizar');

                showToast(`✅ Ticket #${id} → ${nuevoEstado}`);

                // Actualizar localmente para UX instantánea, luego recargar
                const ticket = ticketsData.find(t => t.id === id);
                if (ticket) {
                    ticket.estado = nuevoEstado;
                    renderizarTickets(ticketsData);
                    actualizarStats(ticketsData);
                }

            } catch (error) {
                showToast('❌ ' + error.message, 'danger');
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }

        function filtrar(estado) {
            filtroActual = estado;

            // Actualizar botones activos
            document.querySelectorAll('.filtro-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.toLowerCase().includes(estado.toLowerCase()) ||
                    (estado === 'todos' && btn.textContent.includes('Todos'))) {
                    btn.classList.add('active');
                }
            });

            cargarTickets();
        }

        // Auto-refresh cada 30 segundos
        setInterval(() => {
            if (document.visibilityState === 'visible') {
                cargarTickets();
            }
        }, 30000);

        // Cargar al iniciar
        document.addEventListener('DOMContentLoaded', cargarTickets);
    </script>
</body>
</html>
